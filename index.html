<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nández Studio - Asistente</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💈</text></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #0b141a;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  
  .header {
    background: #1f2c34;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    border-bottom: 1px solid #2a3942;
  }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #f5a623, #e8871e);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .header-info { flex: 1; }
  .header-name { color: #e9edef; font-size: 15px; font-weight: 600; }
  .header-status { color: #8696a0; font-size: 12px; }
  .header-status.typing { color: #00a884; }
  
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    background-color: #0b141a;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23111b21' fill-opacity='0.4'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: #374045; border-radius: 4px; }
  
  .date-chip {
    align-self: center;
    background: #182229;
    color: #8696a0;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 8px;
    margin-bottom: 8px;
  }
  
  .msg-wrap { max-width: 82%; margin-bottom: 2px; }
  .msg-wrap.user { align-self: flex-end; }
  .msg-wrap.bot { align-self: flex-start; }
  
  .msg {
    padding: 6px 12px 6px 10px;
    font-size: 14px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    color: #e9edef;
  }
  .msg-wrap.user .msg {
    background: #005c4b;
    border-radius: 10px 10px 2px 10px;
  }
  .msg-wrap.bot .msg {
    background: #1f2c34;
    border-radius: 10px 10px 10px 2px;
  }
  
  .msg-time {
    float: right;
    font-size: 10.5px;
    color: #8696a0;
    margin-left: 8px;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 3px;
  }
  
  .ticks { display: inline-flex; }
  
  .typing-indicator {
    align-self: flex-start;
    max-width: 82%;
    margin-bottom: 2px;
  }
  .typing-dots {
    background: #1f2c34;
    padding: 10px 16px;
    border-radius: 10px 10px 10px 2px;
    display: flex;
    gap: 4px;
  }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #8696a0;
    animation: bounce 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-4px); }
  }
  
  .quick-replies {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    flex-shrink: 0;
    background: #0b141a;
    -webkit-overflow-scrolling: touch;
  }
  .quick-replies::-webkit-scrollbar { display: none; }
  .quick-btn {
    background: transparent;
    border: 1px solid #2a3942;
    color: #00a884;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }
  .quick-btn:active { background: #1a2e23; }
  
  .input-area {
    padding: 8px 10px;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: #1f2c34;
    flex-shrink: 0;
  }
  .input-wrap {
    flex: 1;
    background: #2a3942;
    border-radius: 24px;
    display: flex;
    align-items: center;
    padding: 0 12px;
    min-height: 42px;
  }
  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    color: #e9edef;
    font-size: 15px;
    padding: 8px 0;
    font-family: inherit;
  }
  .input-wrap input::placeholder { color: #8696a0; }
  
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: #00a884;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .send-btn:disabled { opacity: 0.5; cursor: default; }
  .send-btn:active:not(:disabled) { transform: scale(0.95); }
</style>
</head>
<body>

<div class="header">
  <div class="avatar">NS</div>
  <div class="header-info">
    <div class="header-name">Nández Studio</div>
    <div class="header-status" id="status">en línea</div>
  </div>
</div>

<div class="chat" id="chat">
  <div class="date-chip">HOY</div>
  <div class="msg-wrap bot">
    <div class="msg">
      ¡Ey! Qué tal 👋 Soy el asistente de Nández Studio 💈 ¿En qué te echo una mano?
      <span class="msg-time" id="welcome-time"></span>
    </div>
  </div>
</div>

<div class="quick-replies" id="quickReplies">
  <button class="quick-btn" onclick="sendQuick(this)">¿Qué servicios ofrecéis?</button>
  <button class="quick-btn" onclick="sendQuick(this)">¿Tenéis hueco mañana?</button>
  <button class="quick-btn" onclick="sendQuick(this)">¿Cuánto cuesta un corte?</button>
  <button class="quick-btn" onclick="sendQuick(this)">Quiero reservar</button>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input" placeholder="Escribe un mensaje" autocomplete="off">
  </div>
  <button class="send-btn" id="sendBtn" disabled onclick="send()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const status = document.getElementById("status");
const quickReplies = document.getElementById("quickReplies");

let history = [];
let loading = false;
let msgCount = 0;

document.getElementById("welcome-time").textContent = getTime();

input.addEventListener("input", () => {
  sendBtn.disabled = !input.value.trim() || loading;
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function getTime() {
  return new Date().toLocaleTimeString("es-ES", { hour: "2-digit", minute: "2-digit" });
}

function scrollDown() {
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

function addMsg(text, role) {
  const wrap = document.createElement("div");
  wrap.className = "msg-wrap " + role;
  
  const ticks = role === "user" 
    ? `<span class="ticks"><svg width="16" height="11" viewBox="0 0 16 11" fill="#53bdeb"><path d="M11.07 0L5.96 5.12 4.18 3.34 2.77 4.75l3.19 3.19 6.51-6.51L11.07 0zM8.56 0L3.45 5.12 1.67 3.34.26 4.75l3.19 3.19 6.51-6.51L8.56 0z"/></svg></span>` 
    : "";
  
  wrap.innerHTML = `<div class="msg">${escapeHtml(text)}<span class="msg-time">${getTime()} ${ticks}</span></div>`;
  chat.appendChild(wrap);
  scrollDown();
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}

function showTyping() {
  const el = document.createElement("div");
  el.className = "typing-indicator";
  el.id = "typing";
  el.innerHTML = `<div class="typing-dots"><span></span><span></span><span></span></div>`;
  chat.appendChild(el);
  status.textContent = "escribiendo...";
  status.className = "header-status typing";
  scrollDown();
}

function hideTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
  status.textContent = "en línea";
  status.className = "header-status";
}

function sendQuick(btn) {
  input.value = btn.textContent;
  send();
}

async function send() {
  const text = input.value.trim();
  if (!text || loading) return;
  
  loading = true;
  sendBtn.disabled = true;
  input.value = "";
  msgCount++;
  
  if (msgCount >= 2) quickReplies.style.display = "none";
  
  addMsg(text, "user");
  history.push({ role: "user", content: text });
  
  showTyping();
  
  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: history }),
    });
    
    const data = await res.json();
    const reply = data.reply || "Perdona, ha habido un fallo. ¿Puedes repetirlo?";
    
    hideTyping();
    addMsg(reply, "bot");
    history.push({ role: "assistant", content: reply });
  } catch (err) {
    hideTyping();
    addMsg("Ups, ha habido un problema técnico. Inténtalo de nuevo.", "bot");
  } finally {
    loading = false;
    sendBtn.disabled = !input.value.trim();
    input.focus();
  }
}
</script>

</body>
</html>
